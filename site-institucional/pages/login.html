<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">

    <title>Login</title>
</head>


<body>

    <main class="container">

        <form>

            <div class="logo">
                <a href="../index.html">
                    <div class="logo-row">
                        <img class="icon" src="../assets/img/iconlogo.png" alt="Logo">
                        <span class="white">FRIGO</span><span class="red">LOG</span>
                    </div>
                </a>

                <input class="input-controle" placeholder="  ◉ CONTROLE TÉRMICO DE PONTA A PONTA"></input>
            </div>

            <div class="input-box">
                <i class="bx bx-envelope icone-esquerda"></i>
                <input placeholder="exemplo@frigolog.com" type="email">
            <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <i class="bx bx-lock-alt icone-esquerda"></i>
                <input placeholder="Senha" type="password" id="senha">
                <i class="bx bx-hide icone-direita" id="olho" onclick="toggleSenha()" style="cursor:pointer"></i>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>
                <a href="#">Esqueci a senha</a> <!-- colocar o link depois -->

            </div>

            <button type="submit" class="login">Login</button>

            <div class="register-link">
                <p>Não tem uma conta? <a href="./paginaCadastro.html">Cadastre-se</a></p>

            </div>


        </form>

    </main>


    <script>
        function toggleSenha() {
            const input = document.getElementById('senha');
            const olho = document.getElementById('olho');

            if (input.type === 'password') {
                input.type = 'text';
                olho.className = 'bx bx-show icone-direita';
            } else {
                input.type = 'password';
                olho.className = 'bx bx-hide icone-direita';
            }
        }

    </script>

</body>


</html>
