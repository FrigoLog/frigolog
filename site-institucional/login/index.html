<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">

    <title>Login</title>
</head>


<body>

    <main class="container">

        <form>

            <div class="logo">
                
                <span class="white">FRIGO</span><span class="red">LOG</span>
                <input class="input-controle" placeholder="CONTROLE TÉRMICO DE PONTA A PONTA"></input>
            </div>

            <div class="input-box">
                <input placeholder="Usuário" type="email">
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input placeholder="Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>
                <a href="#">Esqueci senha</a> <!-- colocar o link depois -->

            </div>

            <button type="submit">Login</button>

            <div class="register-link">
                <p>Não tem uma conta? <a href="#">Cadastre-se</a></p> <!-- colocar o link depois -->

            </div>


        </form>

    </main>

</body>


</html>
