<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Frigolog - Login</title>
</head>

<body>
    <div class="container bg-blue">
        <div class="form-login">
            <a href="../index.html" style="text-decoration: none;">
                <div class="logo-row">
                    <img src="../assets/img/iconlogo.png" alt="Logo FrigoLog">

                    <span class="title-logo">
                        <span class="white">FRIGO</span><span class="red">LOG</span>
                    </span>
                </div>
            </a>

            <div class="intro-login">
                <p class="slogan">Controle térmico de ponta a ponta</p>
            </div>

            <div id="alerta_msg" class="alerta-login"></div>


            <div class="input-box">
                <i class="bx bx-envelope icone-esquerda"></i>
                <input placeholder="exemplo@frigolog.com" type="email" id="ipt_email">
            </div>

            <div class="input-box">
                <i class="bx bx-lock-alt icone-esquerda"></i>
                <input placeholder="Senha" type="password" id="ipt_senha">
                <i class="bx bx-hide icone-direita" id="olho" onclick="toggleSenha()" style="cursor:pointer"></i>
            </div>

            <button onclick="logar()" class="btn-login">Login</button>

            <div class="link-registro">
                <p>Não tem uma conta? <a href="./cadastro.html">Cadastre-se</a></p>
            </div>
        </div>
    </div>
</body>
<script>
    let usuarios_email = ["bruno@frigolog.com", "matheus@frigolog.com"]
    let usuarios_senha = ["bruno@123", "matheus@123"]

    function logar() {
        let email_digitado = ipt_email.value;
        let senha_digitada = ipt_senha.value;

        let usuarioExiste = false;
        let usuarioIndex = -1;

        alerta_msg.innerHTML = "";

        for (let i = 0; i < usuarios_email.length; i++) {
            if (usuarios_email[i] == email_digitado) {
                usuarioExiste = true;
                usuarioIndex = i;
                break;
            }
        }

        if (usuarioExiste && usuarios_senha[usuarioIndex] == senha_digitada) {
            window.location.href = "./dashboard/dashboard.html";
        } else {
            alerta_msg.innerHTML = "Email ou senha inválidos.";
        }
    }
    function toggleSenha() {
        const campo = document.getElementById('ipt_senha');

        if (campo.type == "password") {
            campo.type = "text";
        } else {
            campo.type = "password";
        }
    }
</script>

</html>
